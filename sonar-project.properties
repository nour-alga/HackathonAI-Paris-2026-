# SonarCloud configuration — KOVER.IA
# Mettre à jour sonar.organization + sonar.projectKey avec les valeurs de ton compte SonarCloud.

sonar.organization=nour-alga
sonar.projectKey=nour-alga_HackathonAI-Paris-2026-
sonar.projectName=KOVER.IA
sonar.projectVersion=0.2.0

# Sources Python (backend)
sonar.sources=backend
sonar.python.version=3.11

# Tests Python
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions : modules optionnels non utilisés (intégrations externes décoratives)
sonar.exclusions=\
    backend/test_cerebras.py,\
    backend/data/preprocessing/**,\
    backend/ingestion/**,\
    backend/alerting/**,\
    backend/narrative/**,\
    backend/storage/supabase_client.py,\
    backend/models/gat/**,\
    backend/models/lstm/**,\
    backend/agents/taint_agent.py,\
    frontend/**,\
    ia/**,\
    scripts/**,\
    .venv-train/**,\
    salam_ammari_dataset/**,\
    htmlcov/**

# Coverage exclusions : on ne couvre pas main.py (FastAPI wiring) ni les agents
# externes (path_agent qui dépend de torch + fallback) — testés indirectement
sonar.coverage.exclusions=\
    backend/main.py,\
    backend/agents/path_agent.py,\
    backend/agents/reporter_agent.py,\
    backend/agents/orchestrator.py,\
    backend/storage/bigquery_client.py,\
    backend/detection/taint_graph.py,\
    backend/models/path_lstm.py

sonar.sourceEncoding=UTF-8
